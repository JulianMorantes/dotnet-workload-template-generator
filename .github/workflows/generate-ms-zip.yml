name: Generate and ZIP service template

on:
  workflow_dispatch:
    inputs:
      service_name:
        description: 'Service name to generate'
        required: true
        default: 'ms_auth'
      project_name:
        description: 'Project display name'
        required: true
        default: 'UiCode Company'
  issue_comment:
    types: [created, edited]

permissions:
  contents: read
  issues: read

jobs:
  build-and-zip:
    # Solo ejecutar si es workflow_dispatch o si el comentario contiene /generate
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'issue_comment' && startsWith(github.event.comment.body, '/generate'))
    runs-on: ubuntu-latest

    steps:
      - name: Parse inputs from comment
        id: parse
        if: github.event_name == 'issue_comment'
        run: |
          COMMENT="${{ github.event.comment.body }}"
          # Extrae service_name y project_name del formato: /generate service_name "project name"
          SERVICE_NAME=$(echo "$COMMENT" | awk '{print $2}')
          PROJECT_NAME=$(echo "$COMMENT" | sed 's/.*"\(.*\)".*/\1/')
          echo "service_name=$SERVICE_NAME" >> $GITHUB_OUTPUT
          echo "project_name=$PROJECT_NAME" >> $GITHUB_OUTPUT

      - name: Set job inputs
        id: inputs
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "service_name=${{ github.event.inputs.service_name }}" >> $GITHUB_OUTPUT
            echo "project_name=${{ github.event.inputs.project_name }}" >> $GITHUB_OUTPUT
          else
            echo "service_name=${{ steps.parse.outputs.service_name }}" >> $GITHUB_OUTPUT
            echo "project_name=${{ steps.parse.outputs.project_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'

      - name: Make scripts executable
        run: find . -maxdepth 1 -name '*.sh' -exec chmod +x {} \;

      - name: Generate project
        env:
          SERVICE_NAME: ${{ steps.inputs.outputs.service_name }}
          PROJECT_NAME: ${{ steps.inputs.outputs.project_name }}
          BASE_DIR: /tmp/${{ steps.inputs.outputs.service_name }}
        run: ./ms-build-generator.sh

      - name: Restore and build generated solution
        run: |
          pushd "/tmp/${{ steps.inputs.outputs.service_name }}"
          dotnet restore
          dotnet build
          popd

      - name: Create ZIP artifact
        run: zip -r "${{ steps.inputs.outputs.service_name }}.zip" "/tmp/${{ steps.inputs.outputs.service_name }}"

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.inputs.outputs.service_name }}-project
          path: ${{ steps.inputs.outputs.service_name }}.zip

      - name: Comment on issue
        if: github.event_name == 'issue_comment'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ Proyecto generado exitosamente! Descarga el ZIP en los artifacts.'
            })
